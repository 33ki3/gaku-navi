name: バグ報告
description: バグや不具合を報告する
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: バグの概要
      description: どのような問題が発生しましたか？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を記載してください
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきですか？
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際にどう動きましたか？
  - type: input
    id: browser
    attributes:
      label: ブラウザ / 環境
      placeholder: "例: Chrome 130 / iOS Safari 18"
  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット
      description: 問題を説明するスクリーンショットがあれば添付してください
